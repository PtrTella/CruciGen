<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Grid Line Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Card -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGrad)" stroke="#334155" stroke-width="6" />

  <!-- Stylized Crossword Grid Pattern -->
  <g opacity="0.85">
    <!-- Grid Squares -->
    <!-- Row 1 -->
    <rect x="96" y="96" width="96" height="96" rx="16" fill="#1e293b" stroke="#475569" stroke-width="4" />
    <rect x="208" y="96" width="96" height="96" rx="16" fill="url(#accentGrad)" stroke="#475569" stroke-width="4" />
    <rect x="320" y="96" width="96" height="96" rx="16" fill="#0f172a" stroke="#475569" stroke-width="4" /> <!-- Black Cell -->

    <!-- Row 2 -->
    <rect x="96" y="208" width="96" height="96" rx="16" fill="#1e293b" stroke="#475569" stroke-width="4" />
    <rect x="208" y="208" width="96" height="96" rx="16" fill="#1e293b" stroke="#475569" stroke-width="4" />
    <rect x="320" y="208" width="96" height="96" rx="16" fill="#1e293b" stroke="#475569" stroke-width="4" />

    <!-- Row 3 -->
    <rect x="96" y="320" width="96" height="96" rx="16" fill="#0f172a" stroke="#475569" stroke-width="4" /> <!-- Black Cell -->
    <rect x="208" y="320" width="96" height="96" rx="16" fill="#1e293b" stroke="#475569" stroke-width="4" />
    <rect x="320" y="320" width="96" height="96" rx="16" fill="url(#accentGrad)" stroke="#475569" stroke-width="4" />
  </g>

  <!-- Big Stylized Letters overlay -->
  <text x="144" y="172" font-family="'Outfit', sans-serif" font-weight="900" font-size="76" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">C</text>
  <text x="256" y="172" font-family="'Outfit', sans-serif" font-weight="900" font-size="76" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">G</text>
  
  <text x="144" y="284" font-family="'Outfit', sans-serif" font-weight="900" font-size="76" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle">R</text>
  <text x="256" y="284" font-family="'Outfit', sans-serif" font-weight="900" font-size="76" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle">U</text>
  <text x="368" y="284" font-family="'Outfit', sans-serif" font-weight="900" font-size="76" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle">C</text>

  <text x="256" y="396" font-family="'Outfit', sans-serif" font-weight="900" font-size="76" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">I</text>

  <!-- Glowing Accent Dot -->
  <circle cx="368" cy="144" r="16" fill="#10b981" filter="url(#glow)" />
</svg>
